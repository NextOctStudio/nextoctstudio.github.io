<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
</head>
<body>
<div class="nav">
  <a class="nextoct" href="https://www.nextoct.top/sc"><img src="https://s21.ax1x.com/2024/05/02/pkkJh60.png" alt="pFHiYCt.png" border="0" height="45px"></a>
  <a class="home" style="position: absolute; right: 0;" href="https://www.nextoct.top/sc">主页</a>
  <a class="FeeaSim" style="position: absolute; right: 0;" href="https://www.nextoct.top/sc/FeeaSim">FeeaSim</a>
  <a class="lang" id="lang" style="position: absolute; right: 0; user-select: none;">简体中文</a>
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi_bi-chevron-down" viewBox="0 0 16 16" style="position: absolute; right: 0;">
    <path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z"/>
  </svg>
  <div class="list" id="list" style="position: absolute; right: 0; display: none;">
    <a class="EN" id= "EN" style="user-select: none;">English</a></br>
    <a class="SC" id= "SC" style="color: #0095C8; user-select: none;">简体中文</a></br>
    <a class="TC" id= "TC" style="user-select: none;">繁體中文</a>
  </div>
</div>
<script type="text/javascript">
  $(function() {
    $("#EN").on("click", function(e) {
      jumpEN();
    });
    $("#TC").on("click", function(e) {
      jumpTC();
    });
  });
  function jumpEN() {
    var path = window.location.pathname;
    var fileName = path.substring(path.lastIndexOf("/") + 1);
    window.location.href = "../"+fileName;
  }
  function jumpTC() {
    var path = window.location.pathname;
    var fileName = path.substring(path.lastIndexOf("/") + 1);
    window.location.href = "../html/tc/"+fileName;
  }
</script>
<style type="text/css">
    .nav {
      height: 70px;
      line-height: 70px;
      padding-left: 80px;
      display: flex;
      background-color: #FFFFFF;
    }
    .nextoct {
      display: flex;
      align-items: center;
    }
    .home, .FeeaSim, .lang {
      width: 100px;
      height: 70px;
      color: rgb(64, 64, 64);
      font-size: 24px;
      border: 0;
      text-decoration: none;
      text-align: center;
    }
    .home, .lang {
      font-size: 21px;
    }
    .bi_bi-chevron-down {
      margin-right: 110px;
      height: 70px;
      color: rgb(64, 64, 64);
      text-align: center;
    }
    .home {
      margin-right: 390px;
    }
    .home:hover, .FeeaSim:hover {
      color: #0095C8;
    }
    .FeeaSim {
      margin-right: 280px;
    }
    .lang {
      margin-right: 130px;
    }
    .list a {
      color: rgb(88, 88, 88);
      font-size: 20px;
      text-decoration: none;
      background-color: #FFFFFF;
    }
    .EN:hover, .TC:hover {
      color: #000000;
    }
    .list {
      text-align: center;
      margin-right: 105px;
      padding-top: 10px;
      line-height: 35px;
      background-color: white;
      box-shadow: 0px 1px 1px #888888;
      border-right: 0;
      margin-top: 70px;
      width: 130px;
      height: 125px;
    }
    .lang:focus {
      color: #0095C8;
    }
</style>
<script type="text/javascript">
  $(document).ready(function(e) {
      $(".lang").on("click", function(e) {
        e.stopPropagation();
        if ($(".list").hasClass("show")) {
          $(".list").hide().removeClass("show");
        } else {
          $(".list").show().addClass("show");
        }
      });
  });
</script>
</body>
