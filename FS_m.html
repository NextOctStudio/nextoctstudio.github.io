<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextOct Studio</title>
  <link rel="shortcut icon" href="https://s21.ax1x.com/2024/05/02/pkkJh60.png" type="image/x-icon">
  <style>
    @font-face {
      font-family: 'GenSenRounded TW R';
      src:url(font/GenSenRoundedTW-R.ttf) format('truetype');
    }
    * {
      font-family: "GenSenRounded TW R";
    }
    body {
      color: rgb(64, 64, 64);
      padding: 0;
      margin: 0;
    }
  </style>
  <script src="https://cdn.bootcss.com/jquery/1.12.4/jquery.min.js"></script>
</head>
<body style="background: #FFFFFF;">
  <div class="top" style="position: sticky; top: 0;">
    <a class="nextoct" href="https://www.nextoct.top"><img src="https://s21.ax1x.com/2024/04/02/pFHiYCt.png" alt="pFHiYCt.png" border="0" height="30px"></a>
    <div class="li">
      <button class="list_icon" type="button" style="user-select: none;">☰</button>
      <div class="list" id="list" style="position: absolute; right: 0; display: none;">
        <a class="home" href="https://www.nextoct.top">Home</a>
        <a class="FeeaSim" href="https://www.nextoct.top/FeeaSim">FeeaSim</a>
      </div>
    </div>
  </div>
  <style type="text/css">
    .top {
      height: 50px;
      padding-left: 25px;
      display: flex;
      box-shadow: 0px 1px 5px #888888;
      background-color: #FFFFFF;
    }
    .nextoct {
      display: flex;
      align-items: center;
    }
    .list_icon, .list a {
      position: absolute;
      right: 0;
      color: rgb(64, 64, 64);
      font-size: 20px;
      text-decoration: none;
      background-color: #FFFFFF;
    }
    .list_icon {
      width: 50px;
      height: 50px;
      border: 0;
      line-height: 50px;
      text-align: center;
    }
    .list_icon:hover {
      background-color: #F0F0F0;
    }
    .list {
      border: 1px solid #AAAAAA;
      border-right: 0;
      margin-top: 50px;
      width: 150px;
      height: 80px;
    }
    .home, .FeeaSim {
      width: 140px;
      height: 40px;
      padding-left: 10px;
      line-height: 40px;
      background-color: #FAFAFA;
    }
    .home:hover, .FeeaSim:hover {
      background-color: #F0F0F0;
    }
    .FeeaSim {
      margin-top: 40px;
    }
  </style>
  <script type="text/javascript">
    $(document).ready(function(e) {
      $(".list_icon").on("click", function(e) {
        e.stopPropagation();
        if ($(".list").hasClass("show")) {
          $(".list").hide().removeClass("show");
        } else {
          $(".list").show().addClass("show");
        }
      });
      $(document).click(function() {
        $(".list").hide().removeClass("show");
      });
    });
  </script>
  <div class="FS">
    <img class="logo" src="https://s21.ax1x.com/2024/04/02/pFHmwAU.png" alt="pFHmwAU.png" border="0"></br>
  </div>
  <div class="RS">
    <a class="info">Railway Simulator</a>
  </div>
  <div class="pic">
    <img class="display" src="https://s21.ax1x.com/2024/04/02/pFHliAP.png" alt="pFHliAP.png" border="0">
  </div>
  <style type="text/css">
    .FS, .RS, .pic {
      text-align: center;
      margin-top: 15px;
    }
    .pic {
      margin-left: 20px;
      margin-right: 20px;
      margin-top: 20px;
    }
    .logo {
      margin-top: 15px;
      height: 42px;
    }
    .info {
      margin-top: 15px;
      font-size: 25px;
      color: rgb(64, 64, 64);
    }
    .display {
      width: 100%;
    }
  </style>
  <div class="bottom" style="bottom: 0;">
    <div style="border-bottom: 1px solid rgb(200, 204, 209); padding-bottom: 10px;">
      <span style="color: #555555; font-size: 25px; vertical-align: middle;">NextOct Studio</span></br>
    </div>
    <div style="color: #555555; padding-top: 20px;" style="display: inline-block;">
      <span style="display: inline-block;">Content is available under CC BY-SA 4.0 unless otherwise noted.</span></br>
      <span style="display: inline-block; padding-top: 10px;">© 2024 Jan Suoh & NextOct Studio All rights reserved.</span>
      <div style=" padding-top: 15px; word-spacing: 20px;">
        <a href="https://twitter.com/NextOctStudio" style="display: inline-block; color: #0095C8; text-decoration: none;">Twitter(X)</a>
        <a href="https://www.youtube.com/@NextOctStudio" style="display: inline-block; color: #0095C8; text-decoration: none;">YouTube</a>
      </div>
    </div>
  </div>
  <style type="text/css">
    .bottom {
      margin-top: 150px;
      padding-left: 20px;
      padding-top: 40px;
      padding-right: 20px;
      height: 200px;
      background-color: #F0F0F0;
      border-top: 1px solid #AAAAAA;
    }
  </style>
</body>
</html>
